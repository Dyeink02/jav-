<!--
  partials/organizer-hero.html - 视频整理板块头部区域
  包含: hero标题区(模块名/标题/说明/版本更新列表)
  由 [ORGANIZER_HERO] 占位
  workspace-pane默认hidden，通过导航按钮切换显示
-->

<section id="organizer-workspace" class="workspace-pane hidden">
            <header class="hero organizer-hero" id="organizer-hero" data-hero-border-theme="organizer">
              <div class="hero-border-glow hero-border-glow-svg" aria-hidden="true">
                <svg class="hero-border-svg" viewBox="0 0 1200 320" preserveAspectRatio="none" focusable="false">
                  <rect class="hero-border-base" x="1.5" y="1.5" width="1197" height="317" rx="30"></rect>
                  <rect class="hero-border-trace hero-border-trace-core" x="1.5" y="1.5" width="1197" height="317" rx="30" pathLength="100"></rect>
                </svg>
              </div>
              <div class="hero-glow-orb hero-glow-orb-1"></div>
              <div class="hero-glow-orb hero-glow-orb-2"></div>

              <section class="hero-copy">
                <div class="hero-topline">
                  <p class="eyebrow">视频整理模块</p>
                  <span id="organizer-version-badge" class="version-badge">v0.30</span>
                </div>
                <h1>下载文件快速归类</h1>
                <p class="hero-subtitle">全自动改名、整理、删除、排查开头广告视频。</p>
                <p class="hero-connection-tip">
                  建议通过CloudDrive2将网盘挂载至本地进行整理更加方便。或将所有jav爬虫视频下载本地磁盘进行整理
                </p>
              </section>
              <aside class="hero-side">
                <div class="hero-note">
                  <div class="hero-note-head">
                    <span class="hero-note-title">版本更新</span>
                  </div>
                  <div class="hero-note-scroll">
                    <ul id="organizer-version-history-list" class="hero-note-list"></ul>
                  </div>
                </div>
              </aside>
            </header>
