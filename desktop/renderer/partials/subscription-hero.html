<!--
  partials/subscription-hero.html - AV订阅板块头部区域
  本版按 AV 订阅 V2 重新组织：
  - 仅保留订阅说明与三段式业务引导
  - 不在这里承载旧的更新回填逻辑
-->

<section id="subscription-workspace" class="workspace-pane hidden">
  <header class="hero subscription-hero" id="subscription-hero" data-hero-border-theme="subscription">
    <div class="hero-border-glow hero-border-glow-svg" aria-hidden="true">
      <svg class="hero-border-svg" viewBox="0 0 1200 320" preserveAspectRatio="none" focusable="false">
        <rect class="hero-border-base" x="1.5" y="1.5" width="1197" height="317" rx="30"></rect>
        <rect class="hero-border-trace hero-border-trace-core" x="1.5" y="1.5" width="1197" height="317" rx="30" pathLength="100"></rect>
      </svg>
    </div>
    <div class="hero-glow-orb hero-glow-orb-1"></div>
    <div class="hero-glow-orb hero-glow-orb-2"></div>

    <section class="hero-copy">
      <div class="hero-topline">
        <p class="eyebrow">AV 订阅模块</p>
        <span id="subscription-version-badge" class="version-badge">v0.30</span>
      </div>
      <h1>女优订阅与更新追踪</h1>
      <p class="hero-subtitle">把已抓女优沉淀为长期订阅，后续只检查新增影片并一键回填到 JAV 爬虫。</p>
      <p class="hero-connection-tip">支持扫描本地 filmData.json 自动建基线，也支持手动输入演员名称、演员爬取地址、演员番号数新增订阅。</p>
    </section>

    <aside class="hero-side">
      <div class="hero-note">
        <div class="hero-note-head">
          <span class="hero-note-title">订阅引导</span>
        </div>
        <div class="hero-note-scroll">
          <ul class="hero-note-list">
            <li><strong>1.</strong> 使用“最近抓取输出”回填目录，再扫描本地已抓结果。</li>
            <li><strong>2.</strong> 点击“订阅更新”后，软件会对比上次同步数与当前总数。</li>
            <li><strong>3.</strong> 发现更新后，直接点“更新订阅”即可只抓新增影片。</li>
          </ul>
        </div>
      </div>
    </aside>
  </header>
