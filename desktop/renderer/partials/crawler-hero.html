<!--
  partials/crawler-hero.html - JAV爬虫板块头部区域
  包含: 粒子背景画布 + hero标题区(版本号/标题/操作按钮/版本历史)
  由 template 中的 [CRAWLER_HERO] 占位
-->

<section id="crawler-workspace" class="workspace-pane">

<!-- 粒子动画背景(动态星空效果) -->
<div class="particle-canvas" id="particleCanvas"></div>

      <header class="hero" id="crawler-hero" data-hero-border-theme="crawler">
        <!-- 单条圆角闭环流光边框，避免四段独立线条在转角处断开 -->
        <div class="hero-border-glow hero-border-glow-svg" aria-hidden="true">
          <svg class="hero-border-svg" viewBox="0 0 1200 320" preserveAspectRatio="none" focusable="false">
            <rect class="hero-border-base" x="1.5" y="1.5" width="1197" height="317" rx="30"></rect>
            <rect class="hero-border-trace hero-border-trace-core" x="1.5" y="1.5" width="1197" height="317" rx="30" pathLength="100"></rect>
          </svg>
        </div>
        <div class="hero-glow-orb hero-glow-orb-1"></div>
        <div class="hero-glow-orb hero-glow-orb-2"></div>

        <section class="hero-copy">
          <div class="hero-topline">
            <div class="hero-quick-actions">
              <button id="choose-background" class="ghost-button toolbar-button" type="button" data-ui-text="actions.changeBackground"></button>
              <button id="reset-background" class="ghost-button toolbar-button" type="button" data-ui-text="actions.resetBackground"></button>
            </div>
            <p class="eyebrow" data-ui-text="hero.eyebrow"></p>
            <span id="version-badge" class="version-badge">v0.30</span>
          </div>

          <h1 data-ui-text="hero.title"></h1>
          <p class="hero-subtitle">基于开源项目：<a href="https://github.com/raawaa/jav-scrapy" target="_blank" rel="noreferrer">raawaa</a></p>
          <p class="hero-connection-tip" data-ui-text="hero.connectionTip"></p>
        </section>

        <aside class="hero-side">
          <div class="hero-note">
            <div class="hero-note-head">
              <span class="hero-note-title" data-ui-text="hero.versionTitle"></span>
            </div>
            <div class="hero-note-scroll">
              <ul id="version-history-list" class="hero-note-list"></ul>
            </div>
          </div>

          <div class="hero-actions">
            <button id="update-antiblock" class="ghost-button" type="button" data-ui-text="actions.updateAntiBlock"></button>
            <button id="open-output" class="ghost-button" type="button" data-ui-text="actions.openOutput"></button>
            <button id="open-magnet-file" class="ghost-button" type="button" data-ui-text="actions.openMagnetFile"></button>
          </div>
        </aside>
      </header>
